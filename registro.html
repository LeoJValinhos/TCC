<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="registro.css">
    
    <!-- Ícone -->
    <link rel="icon" type="image/png" href="Carrinho.png">
    
    <title>Registro</title>
</head>
<body>
    
    <!-- TOPO -->
    <header class="topo">
        <img src="carrinho2.png" width="70" height="70" alt="Logo Carrinho">
        <h2>INVEX</h2>
    </header>

    <!-- CONTAINER -->
    <div class="main-login">
        
        <div class="card-login">
            <h1>Registre-se</h1>

            <!-- FORM -->
            <form action="registro.php" method="POST">

                <!-- NOME + SOBRENOME -->
                <div class="form-row">
                    <div class="textfield">
                        <label>Nome</label>
                        <input type="text" name="nome"  placeholder="Digite seu nome" required>
                    </div>

                    <div class="textfield">
                        <label>Sobrenome</label>
                        <input type="text" name="sobrenome" placeholder="Digite seu sobrenome" required>
                    </div>
                </div>

                <!-- EMAIL + SENHA -->
                <div class="form-row">
                    <div class="textfield">
                        <label>E-mail</label>
                        <input type="email" name="email" placeholder="Digite seu E-mail"required>
                    </div>

                    <div class="textfield">
                        <label>Senha</label>
                        <input type="password" name="senha" minlength="8" placeholder="mínimo 8 dígitos" required>
                    </div>
                </div>

                <!-- DATA + CPF -->
                <div class="form-row">
                    <div class="textfield">
                        <label>Data de nascimento</label>
                        <input type="date" name="datanascimento" required>
                    </div>

                    <div class="textfield">
                        <label>CPF</label>
                        <input type="text" name="cpf" minlength="11" maxlength="11" pattern="\d*" required>
                    </div>
                </div>

                <!-- CELULAR -->
                <div class="textfield">
                    <label>Celular com DDD</label>
                    <input type="text" name="celular" minlength="11" maxlength="11" pattern="\d*" required>
                </div>

                <!-- TIPO -->
                <div class="textfield">
                    <label>Tipo de cadastro</label>
                    <select name="tipo">
                        <option value="EMPRESA/ADM">EMPRESA/ADM</option>
                        <option value="INDEPENDENTE/USUARIO">INDEPENDENTE/USUARIO</option>
                    </select>
                </div>

                <!-- BOTÃO -->
                <input type="submit" value="Cadastrar" class="btn-login">

                <!-- LINK -->
                <p>Já tem uma conta? 
                    <a href="login.html" class="link-registro">Faça Login</a>
                </p>

            </form>

        </div>
    </div>

    <script src="registro.js"></script>

</body>
</html>
