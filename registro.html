<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="registro.css">
    <link rel="icon" type="image/png" href="Carrinho.png "width="70" height="70">
    <title>Home</title>
</head>
<body>
    
     <header class="topo">

        <img src="carrinho2.png" width="70" height="70" alt="Logo Carrinho" />
        <h2>INVEX</h2>

    </header>

        <div class="main-login"> <!-- Div principal que contém toda a estrutura da página de login -->

        <div class="login-esquerda"> <!-- Div do lado esquerdo da tela -->

        <h1></h1> <!-- Título principal da página -->
            
        <!-- Div do lado direito da tela -->

        <div class="login-direita">   

        <div class="card-login"> <!-- Card onde ficam os campos de login e senha -->  

    <h1>Registre-se</h1>

<!-- inicio registro-->
     <form action="registro.php" method="POST">
        <label>
            <div class="textfield">

            <!-- nome-->
        <p>Nome:</p>
        <input type="text" name="nome" required><br>

<!--sobrenome-->
<p>sobrenome</p>
<input type="text" name="sobrenome" required><br>

<!--senha-->
<p>Senha</p>
<input type="password" placeholder="minimo 8 digitos" minlength="8" name="senha" required><br>

<!--email-->
<p>E-mail</p>
<input type="email" name="email" required><br>

<!-- Data de nascimento-->
<p>Data de nascimento</p>
<input type="date" name="datanascimento" required><br>

<!-- CPF-->
<p>CPF</p>
<input type="text" name="cpf" minlength="11" maxlength="11" pattern="\d*" required><br>

<!-- CELULAR--> 
<p>Celular com DDD</p>
<input type="text" name="celular" minlength="11" maxlength="11" pattern="\d*" required><br>

<!-- TIPO DE CADASTRO-->
         <p>Tipo de cadastro: </p>
        <select id="opcao" name="tipo">
                    <option value="EMPRESA/ADM"> EMPRESA/ADM
                        <option value="INDEPENDENTE/USUARIO"> INDEPENDENTE/USUARIO
                        </option>
                    </option>
                </select>
                
<!--Fim registro -->  

</label>

        <input type="submit" value="Cadastrar" class="btn-login">

        
        <p>Já tem uma conta? 
                      <a href="login.html" class="link-registro">Faça Login</a>
                     </p>

        </div>
    </form>

    <script src="registro.js"></script>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
