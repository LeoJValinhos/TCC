<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="registro.css">

    <!-- Ícone -->
    <link rel="icon"
    type="image/png"
    href="../Imagens/Carrinho.png">

    <title>Registro</title>

</head>

<body>

    <!-- TOPO -->
    <header class="topo">

        <div class="logo-topo">
            <img
            src="../Imagens/carrinho2.png"
            width="70"
            height="70"
            alt="Logo Carrinho">

            <h2>INVEX</h2>
        </div>

    </header>

    <!-- CONTAINER -->
    <div class="main-login">

        <!-- FORMULÁRIO -->
        <div class="card-login">

            <h1>Registre-se</h1>

            <form action="registro.php" method="POST">

                <div class="form-row">

                    <div class="textfield">
                        <label>Nome</label>
                        <input type="text"
                        name="nome"
                        placeholder="Digite seu nome"
                        required>
                    </div>

                    <div class="textfield">
                        <label>Sobrenome</label>
                        <input type="text"
                        name="sobrenome"
                        placeholder="Digite seu sobrenome"
                        required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="textfield">
                        <label>E-mail</label>
                        <input type="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required>
                    </div>

                    <div class="textfield">
                        <label>Senha</label>
                        <input type="password"
                        name="senha"
                        minlength="8"
                        placeholder="mínimo 8 dígitos"
                        required>
                    </div>

                </div>

                <div class="form-row">

                    <div class="textfield">
                        <label>Data de nascimento</label>
                        <input type="date"
                        name="datanascimento"
                        required>
                    </div>

                    <div class="textfield">
                        <label>CPF</label>
                        <input type="text"
                        name="cpf"
                        maxlength="11"
                        placeholder="Digite seu CPF"
                        required>
                    </div>

                </div>

                <div class="textfield">
                    <label>Celular com DDD</label>
                    <input type="text"
                    name="celular"
                    placeholder="Digite seu telefone"
                    required>
                </div>

                <div class="textfield">
                    <label>Tipo de cadastro</label>

                    <select name="tipo">
                        <option>EMPRESA/ADM</option>
                        <option>FUNCIONÁRIO</option>
                    </select>
                </div>

                <div class="textfield">
                    <label>Já possui empresa?</label>

                    <select
                    name="possui_empresa"
                    id="possui_empresa"
                    onchange="toggleEmpresa()">

                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>

                    </select>
                </div>

                <div id="empresa_existente">

                    <div class="textfield">
                        <label>Código da empresa</label>

                        <input
                        type="text"
                        name="codigo_empresa"
                        placeholder="Digite o código da empresa">
                    </div>

                </div>

                <div id="nova_empresa" style="display:none;">

                    <div class="textfield">
                        <label>Nome da empresa</label>

                        <input
                        type="text"
                        name="nome_empresa"
                        placeholder="Digite o nome da empresa">
                    </div>

                    <div class="textfield">
                        <label>CNPJ</label>

                        <input
                        type="text"
                        name="cnpj"
                        placeholder="Digite o CNPJ">
                    </div>

                </div>

                <input
                type="submit"
                value="Cadastrar"
                class="btn-login">

                <p>
                    Já tem uma conta?
                    <a href="login.html" class="link-registro">
                        Faça Login
                    </a>
                </p>

            </form>

        </div>

        <!-- IMAGEM -->
        <div class="lado-direito">

            <img
            src="../Imagens/carrinho2.png"
            alt="Mascote INVEX">

        </div>

    </div>

    <script>

        function toggleEmpresa(){

            let possui =
            document.getElementById(
            "possui_empresa"
            ).value;

            let existente =
            document.getElementById(
            "empresa_existente"
            );

            let nova =
            document.getElementById(
            "nova_empresa"
            );

            if(possui == "sim"){
                existente.style.display = "block";
                nova.style.display = "none";
            }
            else{
                existente.style.display = "none";
                nova.style.display = "block";
            }
        }

        window.onload = toggleEmpresa;

    </script>

</body>
</html>
