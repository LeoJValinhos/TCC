<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="registro.css">

    <!-- Ícone -->
    <link rel="icon"
    type="image/png"
    href="../Imagens/Carrinho.png">

    <title>Registro</title>

</head>

<body>

    <!-- TOPO -->
    <header class="topo">

        <img
        src="/Imagens/carrinho2.png"
        width="70"
        height="70"
        alt="Logo Carrinho">

        <h2>INVEX</h2>

    </header>

    <!-- CONTAINER -->
    <div class="main-login">

        <div class="card-login">

            <h1>Registre-se</h1>

            <!-- FORM -->
            <form action="registro.php" method="POST">

                <!-- =====================================================
                NOME + SOBRENOME
                ===================================================== -->

                <div class="form-row">

                    <div class="textfield">

                        <label>Nome</label>

                        <input
                        type="text"
                        name="nome"
                        placeholder="Digite seu nome"
                        required>

                    </div>

                    <div class="textfield">

                        <label>Sobrenome</label>

                        <input
                        type="text"
                        name="sobrenome"
                        placeholder="Digite seu sobrenome"
                        required>

                    </div>

                </div>

                <!-- =====================================================
                EMAIL + SENHA
                ===================================================== -->

                <div class="form-row">

                    <div class="textfield">

                        <label>E-mail</label>

                        <input
                        type="email"
                        name="email"
                        placeholder="Digite seu e-mail"
                        required>

                    </div>

                    <div class="textfield">

                        <label>Senha</label>

                        <input
                        type="password"
                        name="senha"
                        minlength="8"
                        placeholder="mínimo 8 dígitos"
                        required>

                    </div>

                </div>

                <!-- =====================================================
                DATA + CPF
                ===================================================== -->

                <div class="form-row">

                    <div class="textfield">

                        <label>Data de nascimento</label>

                        <input
                        type="date"
                        name="datanascimento"
                        required>

                    </div>

                    <div class="textfield">

                        <label>CPF</label>

                        <input
                        type="text"
                        name="cpf"
                        minlength="11"
                        maxlength="11"
                        pattern="\d*"
                        placeholder="Digite seu CPF"
                        required>

                    </div>

                </div>

                <!-- =====================================================
                CELULAR
                ===================================================== -->

                <div class="textfield">

                    <label>Celular com DDD</label>

                    <input
                    type="text"
                    name="celular"
                    minlength="11"
                    maxlength="11"
                    pattern="\d*"
                    placeholder="Digite seu telefone"
                    required>

                </div>

                <!-- =====================================================
                TIPO DE CADASTRO
                ===================================================== -->

                <div class="textfield">

                    <label>Tipo de cadastro</label>

                    <select
                    name="tipo"
                    id="tipo">

                        <option value="EMPRESA/ADM">
                            EMPRESA/ADM
                        </option>

                        <option value="FUNCIONARIO">
                            FUNCIONARIO
                        </option>

                    </select>

                </div>

                <!-- =====================================================
                POSSUI EMPRESA
                ===================================================== -->

                <div class="textfield">

                    <label>
                        Já possui empresa?
                    </label>

                    <select
                    name="possui_empresa"
                    id="possui_empresa"
                    onchange="toggleEmpresa()">

                        <option value="sim">
                            Sim
                        </option>

                        <option value="nao">
                            Não
                        </option>

                    </select>

                </div>

                <!-- =====================================================
                EMPRESA EXISTENTE
                ===================================================== -->

                <div id="empresa_existente">

                    <div class="textfield">

                        <label>
                            Código da empresa
                        </label>

                        <input
                        type="text"
                        name="codigo_empresa"
                        maxlength="7"
                        placeholder="Digite o código da empresa">

                    </div>

                </div>

                <!-- =====================================================
                NOVA EMPRESA
                ===================================================== -->

                <div
                id="nova_empresa"
                style="display:none;">

                    <div class="textfield">

                        <label>
                            Nome da empresa
                        </label>

                        <input
                        type="text"
                        name="nome_empresa"
                        placeholder="Digite o nome da empresa">

                    </div>

                    <div class="textfield">

                        <label>
                            CNPJ
                        </label>

                        <input
                        type="text"
                        name="cnpj"
                        minlength="14"
                        maxlength="14"
                        pattern="\d*"
                        placeholder="Digite o CNPJ">

                    </div>

                </div>

                <!-- =====================================================
                BOTÃO
                ===================================================== -->

                <input
                type="submit"
                value="Cadastrar"
                class="btn-login">

                <!-- =====================================================
                LINK LOGIN
                ===================================================== -->

                <p>

                    Já tem uma conta?

                    <a
                    href="login.html"
                    class="link-registro">

                    Faça Login

                    </a>

                </p>

            </form>

        </div>

    </div>

    <!-- =====================================================
    SCRIPT
    ===================================================== -->

    <script>

    function toggleEmpresa(){

        var possui =
        document.getElementById(
        "possui_empresa"
        ).value;

        var existente =
        document.getElementById(
        "empresa_existente"
        );

        var nova =
        document.getElementById(
        "nova_empresa"
        );

        if(possui == "sim"){

            existente.style.display =
            "block";

            nova.style.display =
            "none";

        }else{

            existente.style.display =
            "none";

            nova.style.display =
            "block";

        }

    }

    window.onload = function(){

        toggleEmpresa();

    }

    </script>

</body>
</html>
