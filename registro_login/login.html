<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>INVEX | Login</title>

    <link rel="stylesheet" href="login.css">

    <link rel="icon"
          type="image/png"
          href="../Imagens/Carrinho.png">

</head>

<body>

    <!-- =======================
            TOPO
    ======================== -->

    <header class="topo">

        <div class="logo">

            <img src="../Imagens/carrinho2.png"
                 alt="Logo INVEX">

            <h2>INVEX</h2>

        </div>

    </header>

    <!-- =======================
          CONTEÚDO PRINCIPAL
    ======================== -->

    <main class="main-login">

        <!-- ===================
              LADO ESQUERDO
        ==================== -->

        <section class="lado-esquerdo">

            <div class="card-login">

                <h1>Bem-vindo!</h1>

                <p class="subtitulo">
                    Faça login para acessar sua conta.
                </p>

                <form action="login.php" method="POST">

                    <div class="textfield">

                        <label for="email">
                            E-mail
                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Digite seu e-mail"
                            required>

                    </div>

                    <div class="textfield">

                        <label for="senha">
                            Senha
                        </label>

                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="Digite sua senha"
                            minlength="8"
                            required>

                    </div>

                    <input
                        type="submit"
                        value="Entrar"
                        class="btn-login">

                </form>

                <div class="registro">

                    <span>
                        Não possui uma conta?
                    </span>

                    <a
                        href="registro.html"
                        class="link-registro">

                        Registre-se

                    </a>

                </div>

            </div>

        </section>

        <!-- ===================
              LADO DIREITO
        ==================== -->

        <section class="lado-direito">

            <img
                src="../Imagens/carrinho2.png"
                alt="Sistema de Estoque">

        </section>

    </main>

</body>

</html>
